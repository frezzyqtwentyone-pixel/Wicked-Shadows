    <style>
        /* Moderní tmavý design s barvami Brawl Stars */
        :root {
            --primary-color: #ff0000; /* Brawl Stars žlutá */
            --secondary-color: #000000;
            --accent-color: #e74c3c;
            --bg-color: #000000;
            --card-bg: #1e1e1e;
            --text-color: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            line-height: 1.6;
        }

        header {
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url(Obrázky/wicked_shadows_512.png);
            background-size: cover;
            background-position: center;
            height: 300px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            border-bottom: 5px solid var(--primary-color);
        }

        header h1 {
            font-size: 3rem;
            margin: 0;
            text-transform: uppercase;
            color: var(--primary-color);
            text-shadow: 2px 2px 10px rgb(139, 46, 46);
        }

        .container {
            max-width: 1200px;
            margin: auto;
            padding: 20px;
        }

        .section-title {
            text-align: center;
            margin: 40px 0;
            font-size: 2rem;
            text-transform: uppercase;
            border-bottom: 2px solid var(--primary-color);
            display: inline-block;
            width: 100%;
            padding-bottom: 10px;
        }

        /* Grid pro hráčské profily */
        .roster {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            justify-content: center;
        }

        .player-card {
            background-color: var(--card-bg);
            border-radius: 15px;
            overflow: hidden;
            width: 280px;
            transition: transform 0.3s ease;
            border: 1px solid #333;
            text-align: center;
            padding-bottom: 20px;
        }

        .player-card:hover {
            transform: translateY(-10px);
            border-color: var(--primary-color);
        }

        .player-img {
            width: 100%;
            height: 200px;
            background-color: #333;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 5rem;
        }

        .player-name {
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--primary-color);
            margin: 15px 0 5px 0;
        }

        .player-role {
            font-style: italic;
            color: #aaa;
            margin-bottom: 15px;
        }

        .stats {
            display: flex;
            justify-content: space-around;
            padding: 0 10px;
            font-size: 0.9rem;
        }

        .stat-box {
            background: #504d4d;
            padding: 5px 10px;
            border-radius: 5px;
        }

        footer {
            text-align: center;
            padding: 40px 0;
            margin-top: 50px;
            background-color: #000;
            font-size: 0.8rem;
            color: #666;
        }
        .instagram-text {
            font-size: 2.5rem;
            font-weight: bold;
            color: rgb(255, 0, 255);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            margin-top: 40px;
        }

        .ig-icon-link {
            color: white !important;
            font-size: 4rem;
            text-decoration: none;
            transition: transform 0.3s ease, color 0.3s ease;
            line-height: 1;
        }

        .ig-icon-link:hover {
            color: #ff00dd !important;
            transform: scale(1.2);
        }
    </style>
</head>
